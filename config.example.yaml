# UCXSync configuration for Linux

# Network nodes to sync from
nodes:
  - WU01
  - WU02
  - WU03
  - WU04
  - WU05
  - WU06
  - WU07
  - WU08
  - WU09
  - WU10
  - WU11
  - WU12
  - WU13
  - CU

# Network shares on each node
shares:
  - E$
  - F$

# CIFS/SMB credentials
credentials:
  username: Administrator
  password: ultracam

# Network share mounting
network:
  mount_root: "/ucmount"           # Change per instance, e.g. /ucmount-a and /ucmount-b
  # Optional extra mount.cifs options for tuning legacy SMB sources.
  # Test these one by one on your nodes; common candidates are:
  #   nounix
  #   noserverino
  #   actimeo=1
  #   rsize=65536
  #   wsize=65536
  mount_options: []

# Synchronization settings
sync:
  project: "Arh2k_mezen_200725"      # Project name (used in file paths)
  destination: "/ucdata"              # Default destination root
  max_parallelism: 8
  service_loop_interval: 10s
  min_free_disk_space: 52428800      # 50 MB
  disk_space_safety_margin: 104857600 # 100 MB

# Web server
web:
  host: 0.0.0.0  # Listen on all interfaces
  port: 8080
  # Optional shared dashboard (typically configured only on instance A in dual mode)
  # dashboard:
  #   instances:
  #     - id: a
  #       name: Instance A
  #       url: http://127.0.0.1:8080
  #     - id: b
  #       name: Instance B
  #       url: http://127.0.0.1:8081

# Monitoring
monitoring:
  performance_update_interval: 1s
  ui_update_interval: 2s
  cpu_smoothing_samples: 3
  max_disk_throughput_mbps: 200.0
  network_speed_bps: 1000000000  # 1 Gbps

# Logging
logging:
  level: info
  file: /var/log/ucxsync/ucxsync.log
  max_size: 100     # MB
  max_backups: 5
  max_age: 30       # days

# Notes:
# - For two UCXSync instances, assign each instance its own network.mount_root and web.port.
# - The shared dashboard is enabled via web.dashboard.instances on one instance only.
# - Host routing helper can be installed from install.sh with --install-dualnic-routing.
# - Block-device management in the web UI also assumes Linux system tools.
