# Example configuration for UCXSync instance A
# Use together with: /etc/systemd/system/ucxsync@.service

nodes:
  - WU01
  - WU02
  - WU03
  - WU04
  - WU05
  - WU06
  - WU07

shares:
  - E$
  - F$

credentials:
  username: Administrator
  password: ultracam

network:
  mount_root: "/ucmount-a"

sync:
  destination: "/ucdata"
  max_parallelism: 4
  service_loop_interval: 10s
  min_free_disk_space: 52428800
  disk_space_safety_margin: 104857600

web:
  host: 0.0.0.0
  port: 8080
  dashboard:
    instances:
      - id: a
        name: Instance A
        url: http://127.0.0.1:8080
      - id: b
        name: Instance B
        url: http://127.0.0.1:8081

monitoring:
  performance_update_interval: 1s
  ui_update_interval: 2s
  cpu_smoothing_samples: 3
  max_disk_throughput_mbps: 200.0
  network_speed_bps: 1000000000

logging:
  level: info
  file: /var/log/ucxsync/ucxsync-a.log
  max_size: 100
  max_backups: 5
  max_age: 30